<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College Portal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="popup" class="popup hidden"></div>
<!-- LOGIN -->
<div id="loginPage" class="card glass">

<h2>🎓 Student Login</h2>

<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">

<button onclick="login()">Login</button>

<div id="toast"></div>

</div>

<!-- FORM -->
<div id="formPage" class="card glass hidden">

<h2>Student Registration</h2>

<form>

<fieldset>
<legend>Personal Details</legend>

<label>Name *</label>
<input type="text" id="name">

<label>Age *</label>
<input type="number" id="age">

<label>Address</label>
<textarea id="address"></textarea>

<label>Gender *</label>
<div class="row">
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other
</div>

</fieldset>

<fieldset>
<legend>Academic</legend>

<label>Course *</label>
<select id="course">
<option value="">Select</option>
<option>B.Tech</option>
<option>B.Sc</option>
<option>B.Com</option>
</select>

<label>Branch *</label>
<input type="text" id="branch">

<label>Skills</label>
<div class="row">
<input type="checkbox" value="HTML"> HTML
<input type="checkbox" value="CSS"> CSS
<input type="checkbox" value="JS"> JS
</div>

</fieldset>

<fieldset>
<legend>Contact</legend>

<label>Email *</label>
<input type="email" id="email">

<label>Phone *</label>
<input type="text" id="phone">

</fieldset>

<button type="button" onclick="submitStudent()">Submit</button>
<button type="reset">Reset</button>

</form>

</div>

<!-- SUCCESS SCREEN -->
<div id="success" class="successBox hidden">
    <div class="check">✔</div>
    <h2>Submitted Successfully!</h2>
    <p>Your details have been saved</p>
</div>

<script src="script.js"></script>
<footer>
<marquee style="color:white">Designed By Alisetty Supriya</marquee>
<marquee style="color:white"><h1>Registration Form</h1></marquee>
</footer>

</body>
</html>
